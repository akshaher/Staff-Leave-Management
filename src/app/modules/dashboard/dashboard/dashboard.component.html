<div class="container-fluid">
  <h3 class="mb-4">Dashboard</h3>

  <!-- HOD Dashboard -->

  <div *ngIf="role === 'HOD'" class="row">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h5>Total Staff Members</h5>

          <h2>
            {{ totalStaff }}
          </h2>
        </div>
      </div>
    </div>
  </div>

  <!-- Staff Dashboard -->

  <div *ngIf="role === 'STAFF'" class="row">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h5>Total Leaves</h5>

          <h2>
            {{ totalLeaves }}
          </h2>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h5>Approved</h5>

          <h2 class="text-success">
            {{ approvedLeaves }}
          </h2>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body text-center">
          <h5>Rejected</h5>

          <h2 class="text-danger">
            {{ rejectedLeaves }}
          </h2>
        </div>
      </div>
    </div>
  </div>
</div>
