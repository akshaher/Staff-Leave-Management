<div class="page-shell" *ngIf="staffDetails">
  <div class="card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
      <h3 class="mb-0">Staff Details</h3>
      <button class="btn btn-outline-secondary btn-sm" routerLink="/staff">
        <i class="bi bi-arrow-left me-1"></i>Back to List
      </button>
    </div>
    <div class="card-body">
      <div class="row mb-3">
        <div class="col-md-3 detail-label">Full Name</div>
        <div class="col-md-9">{{ staffDetails.fullName }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-md-3 detail-label">Email</div>
        <div class="col-md-9">{{ staffDetails.email }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-md-3 detail-label">Mobile</div>
        <div class="col-md-9">{{ staffDetails.mobile }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-md-3 detail-label">Department</div>
        <div class="col-md-9">{{ staffDetails.department }}</div>
      </div>
    </div>
  </div>
</div>
