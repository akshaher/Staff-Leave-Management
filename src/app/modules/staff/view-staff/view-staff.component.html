<div class="container mt-4" *ngIf="staffDetails">
  <div class="card">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h3 class="mb-0">Staff Details</h3>
      <button class="btn btn-light btn-sm" routerLink="/staff">Back to List</button>
    </div>
    <div class="card-body">
      <div class="row mb-3">
        <div class="col-md-3 fw-bold">Full Name:</div>
        <div class="col-md-9">{{ staffDetails.fullName }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-md-3 fw-bold">Username:</div>
        <div class="col-md-9">{{ staffDetails.username }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-md-3 fw-bold">Email:</div>
        <div class="col-md-9">{{ staffDetails.email }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-md-3 fw-bold">Mobile:</div>
        <div class="col-md-9">{{ staffDetails.mobile }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-md-3 fw-bold">Department:</div>
        <div class="col-md-9">{{ staffDetails.department }}</div>
      </div>
    </div>
  </div>
</div>
