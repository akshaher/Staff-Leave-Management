<div class="page-shell">
  <div class="card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
      <h3 class="mb-0">Add New Staff</h3>
      <button class="btn btn-outline-secondary btn-sm" routerLink="/staff">
        <i class="bi bi-arrow-left me-1"></i>Back to List
      </button>
    </div>
    <div class="card-body">
      <form [formGroup]="staffForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" formControlName="fullName" class="form-control" [ngClass]="{ 'is-invalid': submitted && f['fullName'].errors }" />
          <div *ngIf="submitted && f['fullName'].errors" class="invalid-feedback">
            <div *ngIf="f['fullName'].errors['required']">Full Name is required</div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" formControlName="email" class="form-control" [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" />
          <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
            <div *ngIf="f['email'].errors['required']">Email is required</div>
            <div *ngIf="f['email'].errors['email']">Email must be a valid email address</div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Mobile</label>
          <input type="text" formControlName="mobileNumber" class="form-control" [ngClass]="{ 'is-invalid': submitted && f['mobileNumber'].errors }" />
          <div *ngIf="submitted && f['mobileNumber'].errors" class="invalid-feedback">
            <div *ngIf="f['mobileNumber'].errors['required']">Mobile number is required</div>
            <div *ngIf="f['mobileNumber'].errors['pattern']">Mobile number must be 10 digits</div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Department</label>
          <input type="text" formControlName="department" class="form-control" [ngClass]="{ 'is-invalid': submitted && f['department'].errors }" />
          <div *ngIf="submitted && f['department'].errors" class="invalid-feedback">
            <div *ngIf="f['department'].errors['required']">Department is required</div>
          </div>
        </div>

        <div class="text-end">
          <button type="submit" class="btn btn-success">
            <i class="bi bi-check2-circle me-1"></i>Save Staff
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
