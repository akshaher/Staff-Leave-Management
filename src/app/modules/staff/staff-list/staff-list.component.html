<div class="page-shell">
  <div class="d-flex justify-content-between align-items-start mb-4 page-actions">
    <div>
      <h2 class="page-title">Staff Management</h2>
      <p class="page-kicker">Find, review, and maintain staff profiles.</p>
    </div>
    <button class="btn btn-primary" routerLink="/staff/add">
      <i class="bi bi-person-plus me-1"></i>
      Add New Staff
    </button>
  </div>

  <div class="soft-card p-3 mb-3">
    <div class="input-group">
      <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
      <input
        type="text"
        class="form-control"
        placeholder="Search by first name"
        [(ngModel)]="searchText"
        (ngModelChange)="page = 1"
      />
    </div>
  </div>
  
  <div class="table-card bg-white overflow-hidden">
  <div class="table-responsive">
  <table class="table table-hover">
    <thead>
      <tr>
        <th>Full Name</th>
        <th>Email</th>
        <th>Mobile</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let staff of staffList | searchStaff: searchText | sortStaff | slice: (page - 1) * pageSize : page * pageSize">
        <td>{{ staff.fullName }}</td>
        <td>{{ staff.email }}</td>
        <td>{{ staff.mobile }}</td>
        <td>
          <button class="btn btn-sm btn-outline-primary me-2" [routerLink]="['/staff/view', staff._id]">
            <i class="bi bi-eye me-1"></i>View
          </button>
          <button class="btn btn-sm btn-outline-danger" (click)="deleteStaff(staff._id)">
            <i class="bi bi-trash me-1"></i>Delete
          </button>
        </td>
      </tr>
      <tr *ngIf="(staffList | searchStaff: searchText).length === 0">
        <td colspan="5" class="text-center empty-state">
          <i class="bi bi-person-lines-fill d-block fs-3 mb-2"></i>
          No staff members found.
        </td>
      </tr>
    </tbody>
  </table>
  </div>
  </div>

  <!-- Pagination -->
  <nav *ngIf="totalPages > 1" aria-label="Page navigation" class="mt-3">
    <ul class="pagination justify-content-center">
      <li class="page-item" [class.disabled]="page === 1">
        <button class="page-link" (click)="prevPage()">Previous</button>
      </li>
      <li class="page-item" *ngFor="let p of getPagesArray()" [class.active]="p === page">
        <button class="page-link" (click)="goToPage(p)">{{ p }}</button>
      </li>
      <li class="page-item" [class.disabled]="page === totalPages">
        <button class="page-link" (click)="nextPage()">Next</button>
      </li>
    </ul>
  </nav>
</div>
