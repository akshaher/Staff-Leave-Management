<div class="login-wrapper">
  <!-- Header -->

  <header class="top-header">
    <div class="container d-flex align-items-center">
      <i class="bi bi-building text-primary me-2 fs-4"></i>

      <h4 class="mb-0 fw-bold text-primary">StaffFlow HR</h4>
    </div>
  </header>

  <!-- Main Section -->

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="card login-card shadow-sm">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <h2 class="fw-bold">Welcome Back</h2>

              <p class="text-muted">Sign in to manage your leave and team</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
              <!-- Email -->

              <div class="mb-3">
                <label class="form-label"> Email Address </label>

                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-envelope"></i>
                  </span>

                  <input
                    type="email"
                    class="form-control"
                    placeholder="name@company.com"
                    formControlName="email"
                  />
                </div>

                <small
                  class="text-danger"
                  *ngIf="submitted && f.email.errors?.required"
                >
                  Email is required
                </small>

                <small
                  class="text-danger"
                  *ngIf="submitted && f.email.errors?.email"
                >
                  Enter valid email
                </small>
              </div>

              <!-- Password -->

              <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center">
                  <label class="form-label"> Password </label>
                </div>

                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                  </span>

                  <input
                    [type]="showPassword ? 'text' : 'password'"
                    class="form-control"
                    placeholder="Enter password"
                    formControlName="password"
                  />

                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    (click)="togglePassword()"
                  >
                    <i
                      class="bi"
                      [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
                    >
                    </i>
                  </button>
                </div>

                <small
                  class="text-danger"
                  *ngIf="submitted && f.password.errors?.required"
                >
                  Password is required
                </small>

                <small
                  class="text-danger"
                  *ngIf="submitted && f.password.errors?.minlength"
                >
                  Minimum 6 characters required
                </small>
              </div>

              <!-- Login Error -->

              <div *ngIf="loginError" class="alert alert-danger">
                {{ loginError }}
              </div>

              <!-- Button -->

              <div class="d-grid">
                <button
                  type="submit"
                  class="btn btn-primary btn-lg"
                  [disabled]="loading"
                >
                  <span *ngIf="!loading">Login</span>

                  <span *ngIf="loading">
                    <span class="spinner-border spinner-border-sm me-2"> </span>

                    Authenticating...
                  </span>
                </button>
              </div>
            </form>

            <!-- Footer -->

            <div class="text-center mt-4 pt-3 border-top">
              <p class="mb-0">
                Don't have an account?

                <a
                  routerLink="/auth/register"
                  class="text-decoration-none fw-semibold"
                >
                  Register
                </a>
              </p>
            </div>
          </div>
        </div>

        <div class="text-center mt-4">
          <small class="text-muted"> © 2024 STAFFFLOW HR SYSTEMS </small>
        </div>
      </div>
    </div>
  </div>
</div>
