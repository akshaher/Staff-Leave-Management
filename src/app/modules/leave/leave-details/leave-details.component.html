<div class="page-shell" *ngIf="leaveDetails">
  <div class="card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
      <h3 class="mb-0">Leave Details</h3>
      <button class="btn btn-outline-secondary btn-sm" routerLink="/leave">
        <i class="bi bi-arrow-left me-1"></i>Back to List
      </button>
    </div>
    <div class="card-body">
      <div class="row mb-3">
        <div class="col-md-3 detail-label">Staff Name</div>
        <div class="col-md-9">{{ leaveDetails.staffName }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-md-3 detail-label">From Date</div>
        <div class="col-md-9">{{ leaveDetails.fromDate | date:'mediumDate' }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-md-3 detail-label">To Date</div>
        <div class="col-md-9">{{ leaveDetails.toDate | date:'mediumDate' }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-md-3 detail-label">Reason</div>
        <div class="col-md-9">{{ leaveDetails.reason }}</div>
      </div>
      <div class="row mb-3">
        <div class="col-md-3 detail-label">Status</div>
        <div class="col-md-9">
          <span class="badge" 
                [ngClass]="{'bg-success': leaveDetails.status === 'Approved', 'bg-warning text-dark': leaveDetails.status === 'Pending', 'bg-danger': leaveDetails.status === 'Rejected'}">
            {{ leaveDetails.status }}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
