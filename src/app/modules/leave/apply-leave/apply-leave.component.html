<div class="page-shell">
  <div class="card">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
      <h3 class="mb-0">Apply for Leave</h3>
      <button class="btn btn-outline-secondary btn-sm" routerLink="/leave">
        <i class="bi bi-arrow-left me-1"></i>Cancel
      </button>
    </div>
    <div class="card-body">
      <form [formGroup]="leaveForm" (ngSubmit)="onSubmit()">
        <div formGroupName="leaveDate"> 
        <div class="mb-3">
          <label class="form-label">Leave From Date</label>
          <input type="date" formControlName="fromDate" class="form-control" [ngClass]="{ 'is-invalid': submitted && leaveForm.get('leaveDate.fromDate')?.errors?.['required'] }" />
          <div *ngIf="submitted &&  leaveForm.get('leaveDate.fromDate')?.errors?.['required']" class="invalid-feedback">
            <div *ngIf="leaveForm.get('leaveDate.fromDate')?.errors?.['required']">From Date is required</div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Leave To Date</label>
          <input type="date" formControlName="toDate" class="form-control" [ngClass]="{ 'is-invalid': submitted && (leaveForm.get('leaveDate.toDate')?.errors || leaveForm.get('leaveDate')?.errors?.['dateRange']) }" />
          <div *ngIf="submitted && leaveForm.get('leaveDate.toDate')?.errors" class="invalid-feedback">
            <div *ngIf="leaveForm.get('leaveDate.toDate')?.errors?.['required']">To Date is required</div>
          </div>
          <div *ngIf="submitted && leaveForm.get('leaveDate')?.errors?.['dateRange']" class="invalid-feedback d-block">
            To Date must be the same or after From Date
          </div>
        </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Reason</label>
          <textarea formControlName="reason" class="form-control" rows="3" [ngClass]="{ 'is-invalid': submitted && f['reason'].errors }"></textarea>
          <div *ngIf="submitted && f['reason'].errors" class="invalid-feedback">
            <div *ngIf="f['reason'].errors['required']">Reason is required</div>
          </div>
        </div>

        <div class="text-end">
          <button type="submit" class="btn btn-success">
            <i class="bi bi-send me-1"></i>Apply Leave
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
