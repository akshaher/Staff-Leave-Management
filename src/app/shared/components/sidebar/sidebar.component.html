<div class="sidebar bg-dark text-white p-3" style="min-height: 100vh; width: 250px;">
  <h4 class="mb-4 text-center border-bottom pb-2">Menu</h4>
  <ul class="nav flex-column gap-2">
    <li class="nav-item">
      <a class="nav-link text-white" routerLink="/dashboard" routerLinkActive="active-link">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
      </a>
    </li>
    
    <li class="nav-item" *ngIf="role === 'HOD'">
      <a class="nav-link text-white" routerLink="/staff" routerLinkActive="active-link" (click)="test()">
        <i class="bi bi-people me-2"></i> Staff Management
      </a>
    </li>
    
    <li class="nav-item">
      <a class="nav-link text-white" routerLink="/leave" routerLinkActive="active-link">
        <i class="bi bi-calendar2-check me-2"></i> Leave Management
      </a>
    </li>
  </ul>
</div>
