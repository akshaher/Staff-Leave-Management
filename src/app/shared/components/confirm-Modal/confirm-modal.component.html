<div
  class="modal fade show"
  tabindex="-1"
  *ngIf="visible"
  [style.display]="'block'"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">
          {{ title }}
        </h5>

        <button
          type="button"
          class="btn-close"
          (click)="onCancel()"
        ></button>
      </div>

      <div class="modal-body">
        <p class="mb-0">
          {{ message }}
        </p>
      </div>

      <div class="modal-footer">

        <button
          type="button"
          class="btn btn-secondary"
          (click)="onCancel()"
        >
          {{ cancelButtonText }}
        </button>

        <button
          type="button"
          class="btn btn-danger"
          (click)="onConfirm()"
        >
          {{ confirmButtonText }}
        </button>

      </div>

    </div>
  </div>
</div>

<div
  class="modal-backdrop fade show"
  *ngIf="visible"
></div>
